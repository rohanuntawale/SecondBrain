name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        # Slim set — the unit tests are offline and avoid torch/embeddings.
        run: pip install numpy rank-bm25 networkx python-dotenv pytest
      - name: Run tests
        env:
          STORAGE_BACKEND: local
          VECTOR_BACKEND: memory
        run: pytest -q
